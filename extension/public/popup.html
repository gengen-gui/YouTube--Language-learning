<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Lingo</title>
    <style>
      :root { --brand: #ff4d4f; --bg: #0f0f0f; --fg: #f1f1f1; --muted: #aaa; --line: #333; }
      * { box-sizing: border-box; }
      body {
        width: 320px; margin: 0; padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg); color: var(--fg);
      }
      h1 { font-size: 16px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
      h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); }
      label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
      input, select {
        width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
        background: #1c1c1c; color: var(--fg); font-size: 13px;
      }
      button {
        width: 100%; margin-top: 12px; padding: 9px; border: none; border-radius: 8px;
        background: var(--brand); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer;
      }
      button.secondary { background: #2a2a2a; color: var(--fg); }
      .row { display: flex; gap: 8px; }
      .row button { margin-top: 0; }
      .msg { font-size: 12px; margin-top: 10px; min-height: 16px; }
      .msg.err { color: #ff7875; }
      .msg.ok { color: #95de64; }
      .hidden { display: none; }
      .userbar { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
      a { color: #69b1ff; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1><span class="dot"></span> YT Lingo</h1>

    <div id="loggedOut">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="min 6 characters" />
      <div class="row">
        <button id="loginBtn">Log in</button>
        <button id="registerBtn" class="secondary">Sign up</button>
      </div>
    </div>

    <div id="loggedIn" class="hidden">
      <div class="userbar">Signed in as <span id="whoami"></span></div>
      <label>Translate captions into</label>
      <select id="targetLang">
        <option value="zh-CN">中文 (简体)</option>
        <option value="zh-TW">中文 (繁體)</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="en">English</option>
      </select>
      <button id="logoutBtn" class="secondary">Log out</button>
      <div class="hint">
        Open any YouTube video — a caption panel appears on the right.
        Click a sentence to save it to your vocab book.
      </div>
    </div>

    <label>API server</label>
    <input id="apiBase" type="text" placeholder="http://localhost:8787" />

    <div id="msg" class="msg"></div>

    <script src="popup.js"></script>
  </body>
</html>
