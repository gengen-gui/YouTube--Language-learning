# Fly.io deployment config for the YT Lingo backend.
#
# One-time setup (run inside the server/ directory):
#   fly launch --no-deploy --copy-config --name <your-app-name>
#   fly volumes create ytlingo_data --size 1 --region <same-region>
#   fly secrets set JWT_SECRET="$(openssl rand -hex 32)"
#   fly deploy
#
# The SQLite database lives on the persistent volume mounted at /data,
# so user accounts & vocab survive restarts and redeploys.

# Change this to your own unique app name (must be globally unique on Fly).
app = "yt-lingo"
primary_region = "iad"   # pick the region closest to you: https://fly.io/docs/reference/regions/

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  NODE_ENV = "production"
  DB_FILE = "/data/data.db"
  TRANSLATE_PROVIDER = "google"
  # JWT_SECRET is NOT set here on purpose — set it as a secret:
  #   fly secrets set JWT_SECRET="$(openssl rand -hex 32)"

# Persistent volume for the SQLite database file.
[mounts]
  source = "ytlingo_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # scale to zero when idle (stays in free allowance)

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

# Fly stops idle machines; a request wakes them (cold start ~1-3s).
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
